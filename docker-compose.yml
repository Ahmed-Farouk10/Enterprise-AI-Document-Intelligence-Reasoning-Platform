version: '3.8'

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: docucentric-postgres
    environment:
      POSTGRES_DB: docucentric
      POSTGRES_USER: ${POSTGRES_USER:-docucentric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docucentric}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docucentric-network
    profiles:
      - production

  # ========================================
  # Redis Cache & Session Store
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: docucentric-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docucentric-network

  # ========================================
  # Backend API (FastAPI)
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docucentric-backend
    ports:
      - "8000:8000"
    environment:
      # Development: Use SQLite
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - LANCEDB_URI=/app/data/vectordb
      - STORAGE_ROOT=/app/data
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
    env_file:
      - ./backend/.env
    volumes:
      # Mount source code for development (hot reload)
      - ./backend:/app
      # Persistent data
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    # Use default CMD from Dockerfile, just add --reload for dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - docucentric-network
    restart: unless-stopped

  # ========================================
  # Celery Worker for Background Tasks
  # ========================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docucentric-celery
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      - redis
      - backend
    networks:
      - docucentric-network
    restart: unless-stopped
    profiles:
      - full

  # ========================================
  # Frontend (Next.js) - Development Mode
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: docucentric-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Prevent node_modules from being overwritten
      - /app/node_modules
      # Ignore .next build directory
      - /app/.next
    depends_on:
      - backend
    networks:
      - docucentric-network
    restart: unless-stopped
    # Development command override
    command: npm run dev

  # ========================================
  # Frontend (Next.js) - Production Mode
  # ========================================
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: docucentric-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - docucentric-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_uploads:


networks:
  docucentric-network:
    driver: bridge
